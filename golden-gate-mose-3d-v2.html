<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Golden Gate MOSE v2 — Day/Night + Cargo Queue</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0b1520;
            font-family:-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;color:#eaf2f8}
  body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

  /* ---- canvas band ---- */
  #stage{position:relative;flex:1 1 auto;min-height:240px;background:#b8d4e3;touch-action:pan-y;overflow:hidden}
  #stage canvas{display:block;width:100%;height:100%}
  #hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);
        font-size:12px;background:rgba(10,20,30,.5);padding:5px 14px;border-radius:20px;pointer-events:none}
  #back{position:absolute;top:12px;left:12px;z-index:5;color:#f1c40f;text-decoration:none;font-size:13px;
        font-weight:600;background:rgba(10,20,30,.72);border:1px solid rgba(255,255,255,.2);
        padding:7px 13px;border-radius:8px}
  #back:hover{background:rgba(10,20,30,.92)}

  /* ---- horizontal control band ---- */
  #ui{flex:0 0 auto;background:#0e1e2c;border-top:1px solid rgba(255,255,255,.14);padding:12px 14px}
  #ui .inner{max-width:1100px;margin:0 auto}
  #ui h1{font-size:14px;margin:0 0 1px}
  #ui .sub{font-size:11px;color:#9fb8c9;margin-bottom:10px}
  .bar{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:flex-end}
  .ctl{flex:1 1 150px;min-width:130px}
  .ctl span{display:block;font-size:11px;color:#9fb8c9;margin-bottom:3px}
  input[type=range]{width:100%;margin:0;accent-color:#f1c40f}
  button{padding:10px 16px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;
         background:#f1c40f;color:#222;transition:background .2s;flex:0 0 auto}
  button.raised{background:#e74c3c;color:#fff}
  button.minor{background:rgba(255,255,255,.12);color:#eaf2f8;font-weight:500;font-size:12px;padding:8px 12px}
  .chk{font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap;flex:0 0 auto;cursor:pointer}
  #status{margin-top:10px;font-size:12px;line-height:1.5;color:#cfe6f5}
  .ok{color:#2ecc71;font-weight:700}.warn{color:#e67e22;font-weight:700}.bad{color:#e74c3c;font-weight:700}
  /* On a phone, don't let the canvas stretch to fill a tall screen: a
     portrait box forces a very wide FOV and the bridge ends up small in
     a lot of empty sky. Pin it to a landscape band instead. */
  @media (max-width:700px){
    #stage{flex:0 0 auto;width:100%;height:min(66vw,58vh)}
  }
  @media (max-width:520px){
    #gateBtn,#fogBtn{flex:1 1 100%}
    #ui .sub{margin-bottom:8px}
  }

  /* ---- embed mode: ?embed=1 — clean image, no chrome ---- */
  body.embed{min-height:0;height:100vh;height:100dvh}
  body.embed #ui,body.embed #hint,body.embed #back{display:none}
  /* the phone media query above must not apply here: the embed's own box
     already sets the shape, so the canvas fills the iframe edge to edge */
  body.embed #stage{touch-action:auto;flex:1 1 auto;height:auto;aspect-ratio:auto;max-height:none;min-height:0}
</style>
</head>
<body>
<div id="stage">
  <a id="back" href="index.html">&#8592; Back to the site</a>
  <div id="hint">drag sideways to orbit &middot; scroll to zoom</div>
</div>
<div id="ui">
 <div class="inner">
  <h1>Golden Gate MOSE — v2</h1>
  <div class="sub">Auto demo playing &mdash; drag the view or use the controls to take over</div>
  <div class="bar">
    <button id="gateBtn">&#9650; Raise the barriers</button>
    <div class="ctl"><span>Storm surge (Pacific side)</span>
      <input type="range" id="surge" min="0" max="100" value="0">
    </div>
    <div class="ctl"><span>Time of day</span>
      <input type="range" id="tod" min="0" max="1000" value="150">
    </div>
    <label class="chk"><input type="checkbox" id="auto"> Auto day/night</label>
    <button id="fogBtn" class="minor">Toggle Karl the Fog</button>
  </div>
  <div id="status"></div>
 </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const EMBED = new URLSearchParams(location.search).has('embed');
if(EMBED) document.body.classList.add('embed');

const stage = document.getElementById('stage');
const stageW = ()=>stage.clientWidth || 1;
const stageH = ()=>stage.clientHeight || 1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb8d4e3);
let fogOn = true;
scene.fog = new THREE.FogExp2(0xc4d7e0, 0.0016);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(stageW(), stageH());
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
stage.appendChild(renderer.domElement);
const camera = new THREE.PerspectiveCamera(55, stageW()/stageH(), 1, 4000);

// Keep the whole strait in frame at any viewport shape. THREE's fov is
// VERTICAL, so a narrow box crops the bridge and the shipping lanes off
// both edges, and a very wide one fisheyes. Work in horizontal terms and
// clamp: below MIN the bridge won't fit, above MAX it distorts. Between
// the two this leaves the original 55 exactly as it was on desktop.
const BASE_VFOV = 55, MIN_HFOV = 78, MAX_HFOV = 100;
function fitFov(){
  const aspect = stageW()/stageH();
  const lo = THREE.MathUtils.degToRad(MIN_HFOV), hi = THREE.MathUtils.degToRad(MAX_HFOV);
  let h = 2*Math.atan(Math.tan(THREE.MathUtils.degToRad(BASE_VFOV)/2)*aspect);
  h = Math.min(Math.max(h, lo), hi);
  camera.fov = THREE.MathUtils.radToDeg(2*Math.atan(Math.tan(h/2)/aspect));
  camera.aspect = aspect;
  camera.updateProjectionMatrix();
}
fitFov();

// ---------- lights ----------
const hemi = new THREE.HemisphereLight(0xdfeaf2, 0x2c3e50, 0.85);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff2d9, 1.1);
sun.castShadow = true;
sun.shadow.camera.left=-400; sun.shadow.camera.right=400;
sun.shadow.camera.top=400; sun.shadow.camera.bottom=-400;
sun.shadow.mapSize.set(2048,2048);
scene.add(sun);
const moon = new THREE.DirectionalLight(0x8fa8c8, 0);
scene.add(moon);
const sunBall = new THREE.Mesh(new THREE.SphereGeometry(28,16,16),
  new THREE.MeshBasicMaterial({color:0xffe9b0}));
scene.add(sunBall);

// ---------- stars ----------
const starPos=[];
for(let i=0;i<700;i++){
  const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI*0.48, r=1600;
  starPos.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph)+50, r*Math.sin(ph)*Math.sin(th));
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const starMat = new THREE.PointsMaterial({color:0xffffff,size:2.2,transparent:true,opacity:0,sizeAttenuation:false});
scene.add(new THREE.Points(starGeo,starMat));

// ---------- seabed ----------
const seabed = new THREE.Mesh(new THREE.PlaneGeometry(3000,3000),
  new THREE.MeshPhongMaterial({color:0x1c2f38}));
seabed.rotation.x = -Math.PI/2; seabed.position.y = -18;
scene.add(seabed);

// ---------- water ----------
const cDayOcean=new THREE.Color(0x14506e), cNightOcean=new THREE.Color(0x061826);
const cDayBay=new THREE.Color(0x1a6a8a), cNightBay=new THREE.Color(0x08202e);
function makeWater(color){
  const g = new THREE.PlaneGeometry(2400, 1200, 48, 24);
  const mesh = new THREE.Mesh(g, new THREE.MeshPhongMaterial({color, transparent:true, opacity:0.86, shininess:120, specular:0x9fd8ff}));
  mesh.rotation.x = -Math.PI/2;
  mesh.userData.base = g.attributes.position.array.slice();
  return mesh;
}
const oceanWater = makeWater(0x14506e); oceanWater.position.set(0,0,-660);
const bayWater   = makeWater(0x1a6a8a); bayWater.position.set(0,0, 540);
scene.add(oceanWater, bayWater);
function waveUpdate(mesh, t, amp){
  const p = mesh.geometry.attributes.position, b = mesh.userData.base;
  for(let i=0;i<p.count;i++){
    const x=b[i*3], y=b[i*3+1];
    p.array[i*3+2] = Math.sin(x*0.012+t*1.3)*amp + Math.cos(y*0.02+t*0.9)*amp*0.6;
  }
  p.needsUpdate = true;
  mesh.geometry.computeVertexNormals();
}

// ---------- headlands ----------
const hillMat = new THREE.MeshPhongMaterial({color:0x6b7f4f, flatShading:true});
const rockMat = new THREE.MeshPhongMaterial({color:0x8d6e63, flatShading:true});
[[-330,-80,120,90],[-420,60,160,120],[-360,220,140,100],[-450,-250,170,105],
 [330,-60,120,85],[430,80,170,130],[370,240,150,95],[460,-230,160,110]]
 .forEach(([x,z,r,h],i)=>{
   const m = new THREE.Mesh(new THREE.ConeGeometry(r,h,7), i%2?rockMat:hillMat);
   m.position.set(x,-18+h/2,z); m.castShadow = m.receiveShadow = true;
   scene.add(m);
 });

// city glow dots on bay-side hills (night only)
const cityMat = new THREE.MeshBasicMaterial({color:0xffd98a, transparent:true, opacity:0});
for(let i=0;i<60;i++){
  const side = i%2?1:-1;
  const d = new THREE.Mesh(new THREE.SphereGeometry(1.6,4,4), cityMat);
  d.position.set(side*(300+Math.random()*160), 5+Math.random()*70, 60+Math.random()*220);
  scene.add(d);
}

// ---------- Golden Gate Bridge ----------
const orange = new THREE.MeshPhongMaterial({color:0xc44536});
const bridge = new THREE.Group(); scene.add(bridge);
const deck = new THREE.Mesh(new THREE.BoxGeometry(560,3,16), orange);
deck.position.y = 36.5; deck.castShadow = true; bridge.add(deck);
const road = new THREE.Mesh(new THREE.BoxGeometry(560,0.4,12),
  new THREE.MeshPhongMaterial({color:0x37474f}));
road.position.y = 38.2; bridge.add(road);
function tower(x){
  const g = new THREE.Group();
  [-7,7].forEach(z=>{
    const leg = new THREE.Mesh(new THREE.BoxGeometry(7,130,7), orange);
    leg.position.set(0,47,z); leg.castShadow = true; g.add(leg);
  });
  [30,70,95,108].forEach(y=>{
    const b = new THREE.Mesh(new THREE.BoxGeometry(6,7,15), orange);
    b.position.set(0,y,0); g.add(b);
  });
  g.position.x = x; bridge.add(g);
}
tower(-120); tower(120);
function cableY(x){
  const ax = Math.abs(x);
  if(ax<=120) return 44 + 68*Math.pow(x/120,2);
  const t = (260-ax)/140;
  return 40 + 72*t*t;
}
[-7,7].forEach(z=>{
  const pts=[];
  for(let x=-260;x<=260;x+=8) pts.push(new THREE.Vector3(x,cableY(x),z));
  bridge.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),120,0.9,6), orange));
  for(let x=-252;x<=252;x+=12){
    const h = cableY(x)-38;
    if(h<1.5) continue;
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,h), orange);
    s.position.set(x,38+h/2,z); bridge.add(s);
  }
});

// deck lamps + tower beacons (glow at night)
const lampMat = new THREE.MeshBasicMaterial({color:0xffd27f, transparent:true, opacity:0});
for(let x=-250;x<=250;x+=25){
  [-8,8].forEach(z=>{
    const l = new THREE.Mesh(new THREE.SphereGeometry(0.9,6,6), lampMat);
    l.position.set(x,40.5,z); bridge.add(l);
  });
}
const beaconMat = new THREE.MeshBasicMaterial({color:0xff3b30, transparent:true, opacity:0});
[-120,120].forEach(x=>{
  const b = new THREE.Mesh(new THREE.SphereGeometry(1.6,8,8), beaconMat);
  b.position.set(x,113.5,0); bridge.add(b);
});
// cable lights
const cableLightMat = new THREE.MeshBasicMaterial({color:0xfff3c4, transparent:true, opacity:0});
[-7,7].forEach(z=>{
  for(let x=-250;x<=250;x+=20){
    const l = new THREE.Mesh(new THREE.SphereGeometry(0.7,5,5), cableLightMat);
    l.position.set(x,cableY(x)+1,z); bridge.add(l);
  }
});

// little cars
const cars=[];
const carColors=[0xffffff,0x90caf9,0xef9a9a,0xfff59d,0xa5d6a7,0xb39ddb];
for(let i=0;i<8;i++){
  const c = new THREE.Mesh(new THREE.BoxGeometry(6,2.2,3),
    new THREE.MeshPhongMaterial({color:carColors[i%6]}));
  c.position.set(-280+i*70, 39.6, i%2?3.5:-3.5);
  c.userData.dir = i%2?1:-1;
  bridge.add(c); cars.push(c);
}

// ---------- MOSE barriers ----------
const gates=[], N=25, gateW=21, spacing=22.5, startX=-247.5, barrierZ=-70;
const gateMat = new THREE.MeshPhongMaterial({color:0xf1c40f});
const caissonMat = new THREE.MeshPhongMaterial({color:0x546e7a});
for(let i=0;i<N;i++){
  const x = startX + gateW/2 + i*spacing;
  const caisson = new THREE.Mesh(new THREE.BoxGeometry(gateW+1,6,36), caissonMat);
  caisson.position.set(x,-18,barrierZ); caisson.receiveShadow = true;
  scene.add(caisson);
  const g = new THREE.Group();
  g.position.set(x,-15,barrierZ+14);
  const flap = new THREE.Mesh(new THREE.BoxGeometry(gateW-1.5,2.5,30), gateMat);
  flap.position.z = -15; flap.castShadow = true;
  g.add(flap);
  scene.add(g); gates.push(g);
}

// ---------- cargo ships ----------
const boxColors=[0xd35400,0x2980b9,0x27ae60,0xc0392b,0x8e44ad,0xf39c12];
const ships=[];
function makeShip(){
  const g = new THREE.Group();
  const hull = new THREE.Mesh(new THREE.BoxGeometry(16,7,56),
    new THREE.MeshPhongMaterial({color:0x263238}));
  hull.position.y = 1.5; g.add(hull);
  const bow = new THREE.Mesh(new THREE.ConeGeometry(8,14,4),
    new THREE.MeshPhongMaterial({color:0x263238}));
  bow.rotation.x = Math.PI/2; bow.rotation.y = Math.PI/4;
  bow.position.set(0,1.5,35); g.add(bow);
  for(let r=0;r<2;r++) for(let c=0;c<4;c++){
    const stack = 1+Math.floor(Math.random()*3);
    for(let s=0;s<stack;s++){
      const box = new THREE.Mesh(new THREE.BoxGeometry(6.5,3.6,10),
        new THREE.MeshPhongMaterial({color:boxColors[(r*4+c+s)%6]}));
      box.position.set(r?4:-4, 6.8+s*3.6, -14+c*11);
      g.add(box);
    }
  }
  const house = new THREE.Mesh(new THREE.BoxGeometry(12,12,7),
    new THREE.MeshPhongMaterial({color:0xeceff1}));
  house.position.set(0,10,-24); g.add(house);
  const shipLight = new THREE.Mesh(new THREE.SphereGeometry(0.8,5,5),
    new THREE.MeshBasicMaterial({color:0xfff3c4, transparent:true, opacity:0}));
  shipLight.position.set(0,17,-24); g.add(shipLight);
  g.userData.light = shipLight;
  return g;
}
const lanes=[-65,0,65];
for(let i=0;i<5;i++){
  const s = makeShip();
  s.position.set(lanes[i%3], 0, -350-i*220-Math.random()*80);
  s.userData.speed = 0.55+Math.random()*0.25;
  scene.add(s); ships.push(s);
}

// ---------- state & UI ----------
let gateTarget = 0, gateAngle = 0, surge = 0, bayLevel = 0;
let dayT = 0.15;
const gateBtn = document.getElementById('gateBtn');
const surgeEl = document.getElementById('surge');
const todEl = document.getElementById('tod');
const autoEl = document.getElementById('auto');
const statusEl = document.getElementById('status');
function setGates(v){
  gateTarget = v;
  gateBtn.textContent = gateTarget ? '▼ Lower the barriers' : '▲ Raise the barriers';
  gateBtn.classList.toggle('raised', !!gateTarget);
}
// ---------- auto demo (camera tour + story) ----------
let tourCam = true;    // camera circles the bridge until the user drags/zooms
let tourStory = true;  // surge builds, gates deploy, ships queue — until user touches controls
let tourT = 0, demoSurge = 0;
gateBtn.onclick = ()=>{ tourStory = false; setGates(gateTarget ? 0 : 1); };
surgeEl.oninput = ()=>{ tourStory = false; };
todEl.oninput = ()=>{ autoEl.checked = false; };
document.getElementById('fogBtn').onclick = ()=>{
  fogOn = !fogOn;
  scene.fog.density = fogOn ? 0.0016 : 0.0003;
};

// ---------- camera orbit ----------
let theta = -0.7, phi = 1.18, radius = 440;
const target = new THREE.Vector3(0, 15, -60);
let dragging=false, px=0, py=0;
renderer.domElement.addEventListener('mousedown',e=>{tourCam=false;dragging=true;px=e.clientX;py=e.clientY});
addEventListener('mouseup',()=>dragging=false);
addEventListener('mousemove',e=>{
  if(!dragging) return;
  theta -= (e.clientX-px)*0.005; phi -= (e.clientY-py)*0.005;
  phi = Math.max(0.15, Math.min(1.45, phi));
  px=e.clientX; py=e.clientY;
});
stage.addEventListener('wheel',e=>{tourCam=false;radius=Math.max(120,Math.min(1400,radius+e.deltaY*0.5))},{passive:true});

// Touch: lock to one gesture. Sideways drags orbit the camera, vertical
// swipes are handed back to the page so the model never traps the scroll.
let touchMode=null, tsx=0, tsy=0;
stage.addEventListener('touchstart',e=>{
  if(EMBED) return;
  const t=e.touches[0]; tsx=px=t.clientX; tsy=py=t.clientY; touchMode=null;
},{passive:true});
stage.addEventListener('touchmove',e=>{
  if(EMBED || e.touches.length>1) return;
  const t=e.touches[0];
  if(touchMode===null){
    const dx=Math.abs(t.clientX-tsx), dy=Math.abs(t.clientY-tsy);
    if(dx+dy < 8) return;
    touchMode = dx>dy ? 'orbit' : 'scroll';
    if(touchMode==='orbit'){ tourCam=false; px=t.clientX; py=t.clientY; }
  }
  if(touchMode!=='orbit') return;      // vertical swipe → page scrolls
  e.preventDefault();
  theta -= (t.clientX-px)*0.005; phi -= (t.clientY-py)*0.005;
  phi = Math.max(0.15, Math.min(1.45, phi));
  px=t.clientX; py=t.clientY;
},{passive:false});
stage.addEventListener('touchend',()=>{touchMode=null},{passive:true});

function resize(){
  fitFov();
  renderer.setSize(stageW(), stageH());
}
if(window.ResizeObserver) new ResizeObserver(resize).observe(stage);
addEventListener('resize', resize);
addEventListener('orientationchange', ()=>setTimeout(resize,150));

// ---------- sky colors ----------
const cNightSky=new THREE.Color(0x0a1428), cDaySky=new THREE.Color(0xb8d4e3), cDawn=new THREE.Color(0xe8956b);
const skyCol = new THREE.Color();

// ---------- animate ----------
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const t = clock.getElapsedTime();
  surge = surgeEl.value/100;

  // auto demo: surge builds, gates deploy, ships queue; camera circles both sides
  tourT += dt;
  if(tourStory){
    const cycle = tourT % 70;
    const surgeTarget = (cycle > 4 && cycle < 44) ? 55 : 8;
    demoSurge += (surgeTarget - demoSurge)*dt*0.35;
    surgeEl.value = Math.round(demoSurge);
    surge = demoSurge/100;
    if(cycle > 8 && cycle < 44 && !gateTarget) setGates(1);
    if(cycle >= 44 && gateTarget) setGates(0);
  }
  if(tourCam){
    theta = -0.7 + tourT*0.09;                // one full circle per ~70s cycle
    phi = 1.05 + 0.22*Math.sin(tourT*0.13);   // gentle rise and dip
    radius = 430 + 120*Math.sin(tourT*0.07);  // ease closer, then back out
  }

  // time of day
  if(autoEl.checked){
    dayT = (dayT + dt/75) % 1;
    todEl.value = Math.round(dayT*1000);
  } else {
    dayT = todEl.value/1000;
  }
  const angle = dayT*Math.PI*2;
  const sunH = Math.sin(angle);
  const day = Math.max(0, sunH), night = Math.max(0, -sunH);
  const twilight = Math.max(0, 1-Math.abs(sunH)*3.5);
  sun.position.set(Math.cos(angle)*600, sunH*500, -250);
  sunBall.position.copy(sun.position).multiplyScalar(2.2);
  sunBall.material.color.setHex(sunH<0.25?0xff9d5c:0xffe9b0);
  sunBall.visible = sunH > -0.05;
  sun.intensity = day*1.15;
  moon.position.set(-Math.cos(angle)*600, -sunH*500, 250);
  moon.intensity = night*0.3;
  hemi.intensity = 0.2 + day*0.65;
  skyCol.copy(cNightSky).lerp(cDaySky, day).lerp(cDawn, twilight*0.55);
  scene.background.copy(skyCol);
  scene.fog.color.copy(skyCol);
  starMat.opacity = night;
  lampMat.opacity = Math.min(1, night*1.4 + twilight*0.6);
  cableLightMat.opacity = lampMat.opacity;
  cityMat.opacity = lampMat.opacity;
  beaconMat.opacity = night * (Math.sin(t*3.5)>0 ? 1 : 0.15);
  oceanWater.material.color.copy(cDayOcean).lerp(cNightOcean, night*0.85);
  bayWater.material.color.copy(cDayBay).lerp(cNightBay, night*0.85);

  // gates
  gateAngle += (gateTarget-gateAngle)*0.03;
  const gateUp = gateAngle > 0.3;
  gates.forEach((g,i)=>{
    g.rotation.x = gateAngle * THREE.MathUtils.degToRad(52) + Math.sin(t*1.5+i)*0.01*gateAngle;
  });

  // water levels
  const oceanLevel = surge*7;
  const protectedBay = gateAngle > 0.8;
  const bayTargetLevel = protectedBay ? 0.3 : oceanLevel*0.85;
  bayLevel += (bayTargetLevel-bayLevel)*0.01;
  oceanWater.position.y = oceanLevel;
  bayWater.position.y = bayLevel;
  waveUpdate(oceanWater, t, 1.2 + surge*3.5);
  waveUpdate(bayWater, t, 0.7 + bayLevel*0.35);

  // ships: queue at the barrier when gates are up
  const waiting = ships.filter(s=>s.position.z < -110).sort((a,b)=>b.position.z-a.position.z);
  let queued = 0;
  ships.forEach(s=>{
    const z = s.position.z;
    let canMove = true;
    if(z < -110){
      const qi = waiting.indexOf(s);
      const stopZ = -160 - qi*85;
      if(gateUp && z >= stopZ-2){ canMove = false; queued++; }
    }
    if(canMove) s.position.z += s.userData.speed*(1+surge*0.3);
    const bob = Math.sin(t*1.2 + s.position.z*0.05);
    s.position.y = (z < -70 ? oceanLevel : bayLevel)*0.9 + bob*0.5;
    s.rotation.z = bob*0.015; s.rotation.x = Math.cos(t + z*0.03)*0.01;
    s.userData.light.material.opacity = night;
    if(s.position.z > 520){
      s.position.z = -900 - Math.random()*350;
      s.position.x = lanes[Math.floor(Math.random()*3)];
    }
  });

  // cars
  cars.forEach(c=>{
    c.position.x += c.userData.dir*(0.9+surge*0.4);
    if(c.position.x>285) c.position.x=-285;
    if(c.position.x<-285) c.position.x=285;
  });

  // status
  const surgePct = Math.round(surge*100);
  const hour = Math.round(((dayT*24 + 6) % 24)*10)/10;
  const hh = Math.floor(hour), mm = Math.round((hour-hh)*60);
  let s = `Clock: <b>${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}</b> &middot; `;
  s += `Barriers: <b>${gateAngle>0.95?'RAISED':gateAngle<0.05?'lowered':'moving…'}</b><br>`;
  s += `Pacific surge: <b>${surgePct}%</b> &middot; Ships queued: <b>${queued}</b><br>`;
  if(surgePct>30 && protectedBay) s += `<span class="ok">SF Bay protected ✓</span>`;
  else if(surgePct>60) s += `<span class="bad">Bay flooding! Raise the barriers!</span>`;
  else if(surgePct>30) s += `<span class="warn">Surge entering the bay…</span>`;
  else if(queued>2) s += `<span class="warn">Harbor pilots are grumbling…</span>`;
  else s += `Calm seas.`;
  statusEl.innerHTML = s;

  // camera
  camera.position.set(
    target.x + radius*Math.sin(phi)*Math.sin(theta),
    target.y + radius*Math.cos(phi),
    target.z + radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(target);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
